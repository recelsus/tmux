if-shell 'uname | grep -q Darwin' 'set-environment -g PATH "/opt/homebrew/bin:/bin:/usr/bin"'

set-option -g default-shell "${SHELL}"
set-option -g status-justify centre
set-option -g status-bg colour237
set-option -g status-interval 60

set-window-option -g window-status-format ' '
set-window-option -g window-status-current-format ' '

set-option -g pane-border-status bottom
set-window-option -g pane-border-format '#{pane_tty} | #{pane_current_path}'

set-option -g status-left-length 60
set-option -g status-left '\
#{?client_prefix,#[bg=colour129] #[],#[bg=colour198] #[]}\
#[bg=colour237]#[fg=colour118] S:#S\
#[bg=colour237]#[fg=colour063] W:#I\
#[bg=colour237]#[fg=colour185] P:#P\
#[bg=colour237]#[fg=colour255] [ #{pane_current_command} ]\
#[bg=colour237]#[fg=colour255] - #{pane_current_path}'

set-option -g status-right-length 60
set-option -g status-right '\
#[bg=colour237] #[fg=colour255] #(curl inet-ip.info) / #H\
#[bg=colour237] #[bg=colour237]#[fg=colour185] %Y-%m-%d %a %R \
#{?client_prefix,#[bg=colour129] #[],#[bg=colour198] #[]}'

set-window-option -g mode-keys vi
set-option -g set-clipboard on
set-option -g mouse on
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"
set-option -g renumber-windows on

bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
bind C-b send-prefix
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind C-n new-session

bind '%' split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind '\' split-window -h -l 25%
bind '_' split-window -v -l 20%

set-hook -g session-created "run ~/.config/tmux/tmux-renumber-sessions.sh"
set-hook -g session-closed "run ~/.config/tmux/tmux-renumber-sessions.sh"
